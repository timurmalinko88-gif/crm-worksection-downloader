<!doctype html>
<html lang="ru">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CRM Downloader | Precision Delivery</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body class="theme-advanced">
  <div class="bg-mesh"></div>
  <div class="bg-noise"></div>

  <header class="topbar">
    <div class="container">
      <div class="brand">
        <span class="logo">⬇️</span>
        <div>
          <div class="brand-title">CRM Downloader Web</div>
          <div class="brand-subtitle">Worksection файловый загрузчик</div>
        </div>
      </div>
      <nav class="nav">
        <a href="{{ url_for('index') }}" class="{{ 'active' if request.endpoint == 'index' }}">Главная</a>
        <a href="{{ url_for('history') }}" class="{{ 'active' if request.endpoint == 'history' }}">История</a>
        <a href="{{ url_for('logs') }}" class="{{ 'active' if request.endpoint == 'logs' }}">Логи</a>
        <a href="{{ url_for('settings') }}" class="{{ 'active' if request.endpoint == 'settings' }}">Настройки</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="flash-wrapper">
      {% for category, message in messages %}
      <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>
</body>

</html>
