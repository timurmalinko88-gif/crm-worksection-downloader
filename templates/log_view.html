{% extends 'layout.html' %}

{% block content %}
<div style="margin: 2rem 0;">
    <a href="{{ url_for('logs') }}" style="text-decoration: none; font-weight: 600; font-size: 0.9rem; opacity: 0.6; display: flex; align-items: center; gap: 0.5rem; margin-bottom: 1rem;">
        <span>←</span> К списку логов
    </a>
    <h3>Инспекция файла</h3>
    <h1 style="font-family: var(--font-mono); font-size: 1.5rem; word-break: break-all;">{{ filename }}</h1>
</div>

<section class="card" style="padding: 1.5rem; background: #000; border-color: #222;">
    <div style="display: flex; justify-content: flex-end; margin-bottom: 1rem; gap: 1rem;">
        <button onclick="copyLogs()" class="btn ghost btn-sm" style="font-size: 0.75rem;">Копировать</button>
        <button onclick="location.reload()" class="btn btn-sm" style="font-size: 0.75rem;">Обновить</button>
    </div>
    
    <div style="background: rgba(0,0,0,0.5); border-radius: 12px; border: 1px solid #111; overflow: hidden;">
        <pre id="log-content-pre" style="margin: 0; padding: 1.5rem; color: #a5b4fc; font-family: var(--font-mono); font-size: 0.9rem; line-height: 1.6; overflow: auto; max-height: 70vh; white-space: pre-wrap; word-break: break-all;">{{ content }}</pre>
    </div>
</section>

<script>
    window.onload = function () {
        const el = document.getElementById('log-content-pre');
        el.scrollTop = el.scrollHeight;
    };

    function copyLogs() {
        const content = document.getElementById('log-content-pre').innerText;
        navigator.clipboard.writeText(content).then(() => {
            alert('Лог скопирован в буфер обмена');
        });
    }
</script>

<style>
    .btn.btn-sm { padding: 0.5rem 1.25rem; }
    .btn.ghost { background: transparent; border-color: #333; color: #888; }
    .btn.ghost:hover { border-color: var(--accent); color: var(--text); }
    
    /* Custom scrollbar for terminal look */
    pre::-webkit-scrollbar { width: 8px; }
    pre::-webkit-scrollbar-track { background: #000; }
    pre::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }
    pre::-webkit-scrollbar-thumb:hover { background: #444; }
</style>
{% endblock %}
